<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Release notes — Portfolio Dashboard</title>
<meta name="description" content="Hvad er nyt i Portfolio Dashboard — en oversigt over de seneste opdateringer, forbedringer og rettelser." />
<link rel="icon" href="favicon.ico" />
<style>
  :root{
    --bg:#0b0e14; --surface:#131722; --surface-2:#1a1f2e; --border:#232838;
    --text:#e6e9f0; --dim:#8b93a7; --green:#26a69a; --red:#ef5350; --accent:#6c7dff;
    --accent-2:#9b7dff; --radius:16px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    line-height:1.55; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:820px;margin:0 auto;padding:0 24px}
  .glow{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(600px 400px at 15% -5%, rgba(108,125,255,.18), transparent 60%),
      radial-gradient(700px 500px at 90% 0%, rgba(155,125,255,.14), transparent 55%);
  }

  /* NAV */
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:rgba(11,14,20,.7);border-bottom:1px solid var(--border)}
  nav .wrap{max-width:1080px;display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;font-size:16px}
  .brand img{width:32px;height:32px;border-radius:8px}
  .nav-right{display:flex;align-items:center;gap:12px}
  .lang{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--surface)}
  .lang button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--dim);
    font:inherit;font-size:12px;font-weight:700;letter-spacing:.03em;padding:7px 11px;cursor:pointer;
    transition:color .15s ease,background .15s ease}
  .lang button[aria-pressed="true"]{background:var(--accent);color:#fff}
  .lang button:hover{color:var(--text)}
  .lang button[aria-pressed="true"]:hover{color:#fff}
  .nav-cta{background:var(--accent);color:#fff;padding:9px 18px;border-radius:10px;
    font-weight:600;font-size:14px;transition:transform .15s ease,background .15s ease}
  .nav-cta:hover{background:#5566ff;transform:translateY(-1px)}

  /* HEAD */
  header{padding:76px 0 30px;text-align:center}
  .eyebrow{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
  h1{font-size:clamp(32px,5vw,52px);line-height:1.05;letter-spacing:-.03em;font-weight:800;margin-bottom:18px}
  .sub{font-size:clamp(16px,2.2vw,19px);color:var(--dim);max-width:560px;margin:0 auto}

  /* RELEASES */
  #releases{padding:24px 0 70px}
  .rel{position:relative;padding:28px 0 4px;border-top:1px solid var(--border)}
  .rel:first-child{border-top:0}
  .rel-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .rel-ver{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .rel-latest{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:#052a22;background:linear-gradient(135deg,var(--green),#2bbf9f);padding:4px 10px;border-radius:999px}
  .rel-date{font-size:14px;color:var(--dim);margin-left:auto}
  .rel ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .rel li{display:flex;gap:13px;align-items:flex-start;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;padding:15px 17px}
  .rel li .ic{font-size:19px;line-height:1.3;flex-shrink:0}
  .rel li .tx{font-size:15px}
  .rel li .tx b{font-weight:700}
  .rel li .tx span{display:block;color:var(--dim);font-size:14px;margin-top:2px}

  footer{border-top:1px solid var(--border);padding:34px 0;text-align:center;color:var(--dim);font-size:14px}
  footer a{color:var(--accent)}

  @media(max-width:700px){ .brand span.label{display:none} header{padding:52px 0 24px} }
</style>
</head>
<body>
<div class="glow"></div>

<nav>
  <div class="wrap">
    <a class="brand" href="/"><img src="appicon.png" alt="" /> <span class="label">Portfolio Dashboard</span></a>
    <div class="nav-right">
      <div class="lang" role="group" aria-label="Language / Sprog">
        <button type="button" data-lang="da">DA</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <a class="nav-cta" href="https://github.com/PortfolioLabAI/portfolio-dashboard-shared/releases/latest/download/Portfolio-Dashboard-autoupdate.dmg" data-i18n="nav_download">Download</a>
    </div>
  </div>
</nav>

<header>
  <div class="wrap">
    <div class="eyebrow" data-i18n="eyebrow">Hvad er nyt</div>
    <h1 data-i18n="h1">Release notes</h1>
    <p class="sub" data-i18n="sub">Et kort overblik over hvad de nyeste opdateringer tilføjer og retter. Appen opdaterer sig selv — du behøver ikke gøre noget.</p>
  </div>
</header>

<section>
  <div class="wrap">
    <div id="releases"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span data-i18n="footer">Portfolio Dashboard · privat app · data hentes fra Yahoo Finance</span>
    · <a href="/" data-i18n="footer_home">Til forsiden</a>
  </div>
</footer>

<script>
(function () {

    {
      version: "0.2.49", date: "2026-07-14",

        { ic: "🎯", da: ["FIRE Progress: se hvornår du når dit mål.", "På Fire-fanen kan du sætte dit FIRE-tal og se hvor langt du er, plus en estimeret FIRE-dato ud fra din formue + årlige indbetalinger og valgt afkast — vokset efter aktieskat."],
                     en: ["FIRE Progress: see when you'll reach your goal.", "On the Fire tab you can set your FIRE number and see how far you are, plus an estimated FIRE date from your wealth + yearly contributions and chosen return — grown net of share tax."] },
        { ic: "🗂️", da: ["Vælg hvilke depoter der er frie midler vs. pension.", "På det samlede overblik tagger du hvert depot som Frit, Pension eller fra — så beregningerne kører på de rigtige penge."],
                     en: ["Choose which depots are free funds vs. pension.", "On the combined overview you tag each depot as Free, Pension or off — so the calculations run on the right money."] },
        { ic: "🔥", da: ["To-faset nedsparing før og efter pension.", "Fase 1 viser om dine frie midler rækker indtil pensionen starter (med aktieskat og evt. kontant buffer). Fase 2 viser om pension + resten kan finansiere resten af livet — med ratepension, livrente, folkepension, PAL-skat og månedsløn efter skat."],
                     en: ["Two-phase drawdown before and after pension.", "Phase 1 shows whether your free funds last until the pension starts (with share tax and an optional cash buffer). Phase 2 shows whether pension + the rest can finance the rest of life — with ratepension, life annuity, state pension, PAL tax and monthly income after tax."] }
      ]
    },
    {
      version: "0.2.48", date: "2026-07-14",
      items: [
        { ic: "💾", da: ["Fire: dine tal gemmes nu pr. depot.", "Tidligere delte alle depoter de samme Fire-tal. Nu husker hvert depot sine egne tal for afkast, indbetaling og antal år — så du ser de rigtige tal for det depot, du står på."],
                     en: ["Fire: your numbers are now saved per depot.", "Previously all depots shared the same Fire numbers. Now each depot remembers its own return, contribution and years — so you see the right numbers for the depot you're on."] }
      ]
    },
    {
      version: "0.2.47", date: "2026-07-14",
      items: [
        { ic: "🔼", da: ["Fire: pilene op/ned i tal-felterne virker nu i appen.", "På Fire-fanen kan du nu klikke op og ned i felterne for afkast, indbetaling og antal år — også i Mac-appen, hvor pilene før ikke reagerede."],
                     en: ["Fire: the up/down arrows in the number fields now work in the app.", "On the Fire tab you can now click up and down in the return, contribution and years fields — including in the Mac app, where the arrows previously didn't respond."] }
      ]
    },
    {
      version: "0.2.46", date: "2026-07-14",
      items: [
        { ic: "🔥", da: ["Ny Fire-fane: fremskrivning af din formue.", "En ny fane til højre for Analyse viser din nuværende værdi og dit historiske gennemsnitlige årlige afkast, og tegner en graf mange år frem med renters rente. Du kan lægge op til 3 egne scenarier oveni (forventet afkast % + årlig indbetaling i et antal år), slå hver kurve til/fra, og køre musen hen over grafen for at se værdien år for år. Virker både på et enkelt depot og på det samlede overblik."],
                     en: ["New Fire tab: project your wealth.", "A new tab to the right of Analysis shows your current value and your historical average annual return, and plots a graph many years ahead with compound interest. You can layer on up to 3 of your own scenarios (expected return % + yearly contribution over a number of years), toggle each curve on/off, and hover the graph to read the value year by year. Works both on a single depot and on the combined overview."] },
        { ic: "🧭", da: ["Sidepanelet med depoter kan nu scrolle.", "Har du mange depoter, kan listen til venstre nu rulle for sig selv i stedet for at skubbe siden."],
                     en: ["The depot sidebar now scrolls.", "With many depots, the left-hand list now scrolls on its own instead of pushing the page."] }

    },

      items: [

      ]
    },
    {
      version: "0.2.43", date: "2026-07-14",
      items: [
        { ic: "🖨️", da: ["Print virker nu i Mac-appen og giver en pæn PDF.", "Print åbner nu den rigtige print-dialog i appen, og siden printes på hvid baggrund med sort tekst — ikke en sort side."],
                     en: ["Print now works in the Mac app and makes a clean PDF.", "Print now opens the proper print dialog in the app, and the page prints on a white background with black text — not a black page."] },
        { ic: "🗂️", da: ["Kategori-overblik bliver på kategorien når du skifter fane.", "Vælger du fx Pension og klikker Aktieoverblik/Udbytte/Analyse, bliver du nu på kategorien og ser kun dens data — i stedet for at hoppe op på det samlede overblik."],
                     en: ["The category overview stays on the category when you switch tabs.", "Pick e.g. Pension and click Holdings/Dividends/Analysis and you now stay on the category, seeing only its data — instead of jumping up to the combined overview."] }
      ]
    },
    {
      version: "0.2.42", date: "2026-07-14",
      items: [
        { ic: "🖨️", da: ["Print / gem som PDF på alle sider.", "Ny 🖨️ Print-knap ved siden af Opdatér — printer hele siden med alle kort og tabeller, eller gemmer den som PDF."],
                     en: ["Print / save as PDF on every page.", "A new 🖨️ Print button next to Refresh — prints the whole page with all its cards and tables, or saves it as a PDF."] },
        { ic: "🗂️", da: ["Klik på en kategori bliver på kategorien.", "Når du klikker fx Pension i sidebaren, viser den et samlet overblik for netop de depoter, og markeringen bliver på kategorien i stedet for at hoppe op på det globale overblik."],
                     en: ["Clicking a category stays on the category.", "Clicking e.g. Pension in the sidebar shows a combined overview for just those depots, and the selection stays on the category instead of jumping up to the global overview."] },
        { ic: "📐", da: ["Ens fane-rækkefølge på Portfolio Overview.", "Udbytte-fanen ligger nu før Analyse — samme rækkefølge som på de enkelte depoter."],
                     en: ["Consistent tab order on Portfolio Overview.", "The Dividends tab now comes before Analysis — the same order as on individual depots."] }
      ]
    },
    {
      version: "0.2.41", date: "2026-07-14",
      items: [
        { ic: "🔒", da: ["Privacy mode skjuler nu også dagens beløb.", "I aktieoverblikket blev det absolutte beløb i parentes efter dagens % stadig vist — nu skjules det også som prikker, så porteføljens størrelse ikke kan regnes ud."],
                     en: ["Privacy mode now also hides today's amount.", "In the holdings view the absolute amount in parentheses after today's % was still visible — it's now masked as dots too, so the portfolio size can't be inferred."] },
        { ic: "🗂️", da: ["Træk hele kategorier for at ændre rækkefølge.", "I admin kan du nu trække en hel kategori (med dens depoter) op eller ned — ikke kun enkelte depoter."],
                     en: ["Drag whole categories to reorder.", "In admin you can now drag an entire category (with its depots) up or down — not just individual depots."] },
        { ic: "🏷️", da: ["Ensartet navngivning af udbytte-prognose.", "“Forventet udbytte i år” og “Forventet i år” bruges nu konsekvent i hele appen."],
                     en: ["Consistent dividend-forecast naming.", "“Expected dividend this year” and “Expected this year” are now used consistently throughout the app."] },
        { ic: "📐", da: ["Ingen layout-hop mellem faner.", "Når du skiftede mellem Oversigt, Aktieoverblik, Udbytte og Analyse kunne indholdet flytte sig lidt til siden — nu står det fast."],
                     en: ["No layout jump between tabs.", "Switching between Overview, Holdings, Dividends and Analysis could shift the content slightly sideways — it now stays put."] },
        { ic: "🔔", da: ["Opdaterings-dialogen viser nu release notes.", "Når en ny version er klar, viser dialogen hvad der er nyt plus et link hertil."],
                     en: ["The update dialog now shows release notes.", "When a new version is ready, the dialog shows what's new plus a link to this page."] },
        { ic: "⏱️", da: ["Tjekker opdateringer hver 3. time.", "Tidligere tjekkede appen kun ved opstart; nu fanger et vindue der står åbent også nye versioner undervejs."],
                     en: ["Checks for updates every 3 hours.", "Previously the app only checked at launch; a window left open now picks up new versions along the way too."] }
      ]
    },
    {
      version: "0.2.40", date: "2026-07-14",
      items: [
        { ic: "🗂️", da: ["Vælg kategori når du opretter et depot.", "“＋ Ny portefølje” spørger nu om navn og (valgfri) kategori i én dialog."],
                     en: ["Pick a category when creating a depot.", "“＋ New portfolio” now asks for name and an optional category in a single dialog."] },
        { ic: "📥", da: ["Mere robust Nordnet- og Nordea-import.", "Flere kant-tilfælde håndteres korrekt — bl.a. fond-konverteringer og aktie-splits."],
                     en: ["More robust Nordnet and Nordea import.", "More edge cases are handled correctly — including fund conversions and stock splits."] }
      ]
    },
    {
      version: "0.2.35 – 0.2.39", date: "2026-07-13 – 14",
      items: [
        { ic: "📥", da: ["Import-forbedringer.", "En række rettelser til import fra Nordnet og Nordea, inkl. udenlandske aktieklasser."],
                     en: ["Import improvements.", "A series of fixes to Nordnet and Nordea import, including foreign share classes."] },
        { ic: "📊", da: ["Overblik pr. kategori.", "Klik en kategori i sidebjælken for at se et samlet overblik kun for den gruppe af depoter."],
                     en: ["Per-category overview.", "Click a category in the sidebar to see a combined overview for just that group of depots."] }
      ]
    }
  ];

  var STR = {
    da: {
      title: "Release notes — Portfolio Dashboard",
      meta: "Hvad er nyt i Portfolio Dashboard — en oversigt over de seneste opdateringer, forbedringer og rettelser.",
      nav_download: "Download",
      eyebrow: "Hvad er nyt",
      h1: "Release notes",
      sub: "Et kort overblik over hvad de nyeste opdateringer tilføjer og retter. Appen opdaterer sig selv — du behøver ikke gøre noget.",
      latest: "Nyeste",
      footer: "Portfolio Dashboard · privat app · data hentes fra Yahoo Finance",
      footer_home: "Til forsiden"
    },
    en: {
      title: "Release notes — Portfolio Dashboard",
      meta: "What's new in Portfolio Dashboard — an overview of the latest updates, improvements and fixes.",
      nav_download: "Download",
      eyebrow: "What's new",
      h1: "Release notes",
      sub: "A short overview of what the latest updates add and fix. The app updates itself — you don't have to do anything.",
      latest: "Latest",
      footer: "Portfolio Dashboard · private app · data from Yahoo Finance",
      footer_home: "Home"
    }
  };

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderReleases(lang) {
    var latestLabel = (STR[lang] || STR.en).latest;
    var html = "";
    for (var i = 0; i < RELEASES.length; i++) {
      var r = RELEASES[i];
      var badge = i === 0 ? ' <span class="rel-latest">' + esc(latestLabel) + "</span>" : "";
      html += '<div class="rel"><div class="rel-head">' +
        '<span class="rel-ver">' + esc(r.version) + "</span>" + badge +
        '<span class="rel-date">' + esc(r.date) + "</span></div><ul>";
      for (var j = 0; j < r.items.length; j++) {
        var it = r.items[j];
        var parts = it[lang] || it.en;
        html += '<li><span class="ic">' + it.ic + '</span><span class="tx"><b>' +
          esc(parts[0]) + "</b><span>" + esc(parts[1]) + "</span></span></li>";
      }
      html += "</ul></div>";
    }
    document.getElementById("releases").innerHTML = html;
  }

  function apply(lang) {
    var dict = STR[lang] || STR.en;
    document.documentElement.lang = lang;
    document.title = dict.title;
    var md = document.querySelector('meta[name="description"]');
    if (md) md.setAttribute("content", dict.meta);
    var nodes = document.querySelectorAll("[data-i18n]");
    for (var i = 0; i < nodes.length; i++) {
      var k = nodes[i].getAttribute("data-i18n");
      if (dict[k] != null) nodes[i].innerHTML = dict[k];
    }
    var btns = document.querySelectorAll("[data-lang]");
    for (var j = 0; j < btns.length; j++) {
      btns[j].setAttribute("aria-pressed", btns[j].getAttribute("data-lang") === lang ? "true" : "false");
    }
    renderReleases(lang);
  }

  function saved() { try { return localStorage.getItem("pd_lang"); } catch (e) { return null; } }
  function save(l) { try { localStorage.setItem("pd_lang", l); } catch (e) {} }

  var manual = saved();
  apply(manual || ((navigator.language || "").toLowerCase().indexOf("da") === 0 ? "da" : "en"));

  if (!manual) {
    // Same country rule as the landing page: Danish only for Denmark.
    fetch("/api/geo")
      .then(function (r) { return r.json(); })
      .then(function (d) { if (!saved()) apply(d && d.country === "DK" ? "da" : "en"); })
      .catch(function () {});
  }

  document.addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("[data-lang]") : null;
    if (!b) return;
    save(b.getAttribute("data-lang"));
    apply(b.getAttribute("data-lang"));
  });
})();
</script>
