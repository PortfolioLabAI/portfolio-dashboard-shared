<style>

  .lang button:hover{color:var(--text)}
  .lang button[aria-pressed="true"]:hover{color:#fff}

  .eyebrow{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}

  .rel{position:relative;padding:28px 0 4px;border-top:1px solid var(--border)}
  .rel:first-child{border-top:0}
  .rel-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .rel-ver{font-size:22px;font-weight:800;letter-spacing:-.02em}

  .rel-date{font-size:14px;color:var(--dim);margin-left:auto}
  .rel ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .rel li{display:flex;gap:13px;align-items:flex-start;background:var(--surface);

  .rel li .tx b{font-weight:700}
  .rel li .tx span{display:block;color:var(--dim);font-size:14px;margin-top:2px}

  footer{border-top:1px solid var(--border);padding:34px 0;text-align:center;color:var(--dim);font-size:14px}
  footer a{color:var(--accent)}

  @media(max-width:700px){ .brand span.label{display:none} header{padding:52px 0 24px} }
</style>
</head>

    en: {
      title: "Release notes — Portfolio Dashboard",
      meta: "What's new in Portfolio Dashboard — an overview of the latest updates, improvements and fixes.",
      nav_download: "Download",
      eyebrow: "What's new",
      h1: "Release notes",
      sub: "A short overview of what the latest updates add and fix. The app updates itself — you don't have to do anything.",
      latest: "Latest",
      footer: "Portfolio Dashboard · private app · data from Yahoo Finance",
      footer_home: "Home",
      footer_support: "Support development"
    }
  };

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderReleases(lang) {
    var latestLabel = (STR[lang] || STR.en).latest;
    var html = "";
    for (var i = 0; i < RELEASES.length; i++) {
      var r = RELEASES[i];
      var badge = i === 0 ? ' <span class="rel-latest">' + esc(latestLabel) + "</span>" : "";
      html += '<div class="rel"><div class="rel-head">' +
        '<span class="rel-ver">' + esc(r.version) + "</span>" + badge +
        '<span class="rel-date">' + esc(r.date) + "</span></div><ul>";
      for (var j = 0; j < r.items.length; j++) {
        var it = r.items[j];
        var parts = it[lang] || it.en;
        html += '<li><span class="ic">' + it.ic + '</span><span class="tx"><b>' +
          esc(parts[0]) + "</b><span>" + esc(parts[1]) + "</span></span></li>";
      }
      html += "</ul></div>";
    }
    document.getElementById("releases").innerHTML = html;
  }

  function apply(lang) {
    var dict = STR[lang] || STR.en;
    document.documentElement.lang = lang;
    document.title = dict.title;
    var md = document.querySelector('meta[name="description"]');
    if (md) md.setAttribute("content", dict.meta);
    var nodes = document.querySelectorAll("[data-i18n]");
    for (var i = 0; i < nodes.length; i++) {
      var k = nodes[i].getAttribute("data-i18n");
      if (dict[k] != null) nodes[i].innerHTML = dict[k];
    }
    var btns = document.querySelectorAll("[data-lang]");
    for (var j = 0; j < btns.length; j++) {
      btns[j].setAttribute("aria-pressed", btns[j].getAttribute("data-lang") === lang ? "true" : "false");
    }
    renderReleases(lang);
  }

  function saved() { try { return localStorage.getItem("pd_lang"); } catch (e) { return null; } }
  function save(l) { try { localStorage.setItem("pd_lang", l); } catch (e) {} }

  var manual = saved();
  apply(manual || ((navigator.language || "").toLowerCase().indexOf("da") === 0 ? "da" : "en"));

  if (!manual) {
    // Same country rule as the landing page: Danish only for Denmark.
    fetch("/api/geo")
      .then(function (r) { return r.json(); })
      .then(function (d) { if (!saved()) apply(d && d.country === "DK" ? "da" : "en"); })
      .catch(function () {});
  }

  document.addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("[data-lang]") : null;
    if (!b) return;
    save(b.getAttribute("data-lang"));
    apply(b.getAttribute("data-lang"));
  });
})();
